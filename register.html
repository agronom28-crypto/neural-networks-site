<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — NeuralHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">🧠 NeuralHub</div>
    <h2>Регистрация</h2>

    <div id="auth-error" class="auth-error" style="display:none"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="reg-name" placeholder="Ваше имя" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="reg-password" placeholder="Минимум 6 символов" required minlength="6">
      </div>
      <div class="form-group">
        <label>Повтор пароля</label>
        <input type="password" id="reg-password2" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary full-width">Создать аккаунт</button>
    </form>

    <p class="auth-switch">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    <p class="auth-switch"><a href="index.html">← На главную</a></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      const err = document.getElementById('auth-error');

      if (password !== password2) {
        err.textContent = 'Пароли не совпадают';
        err.style.display = 'block';
        return;
      }
      const result = authRegister(name, email, password);
      if (result.success) {
        window.location.href = 'index.html';
      } else {
        err.textContent = result.message;
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
